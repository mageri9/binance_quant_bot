services:
  bot:
    image: ${GHCR_IMAGE_NAME:-ghcr.io/mageri9/binance_quant_bot}:latest
    container_name: binance_quant_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./src/db/db.db:/app/src/db/db.db
      - ./logs:/app/logs
      - ./models/saved_models:/app/models/saved_models
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot_net
      - nexus_shared
      - postgres_net

  redis:
    image: redis:7-alpine
    container_name: bot-redis
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bot_net

volumes:
  redis_data:

networks:
  bot_net:
    driver: bridge
  nexus_shared:
    external: true
  postgres_net:
    external: true
    name: tarot_bot_tarot_bot_net