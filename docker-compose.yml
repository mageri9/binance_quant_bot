services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./src/db:/app/src/db        # persist SQLite
      - ./logs:/app/logs            # persist logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - bot_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      ${REDIS_PASSWORD:+--requirepass $REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - bot_net

volumes:
  redis_data:

networks:
  bot_net:
    driver: bridge
